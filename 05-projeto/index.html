<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working with form</title>
    <form>
        <h1>Data Form</h1>
        <label for="first-name">First Name</label><br>
        <input type="text" id="first-name" name="first-name" placeholder="First name" required><br><br>

        <label for="last-name">Last Name</label><br>
        <input type="text" id="last-name" name="last-name" placeholder="Last name" required><br><br>

        <label for="email">Your email</label><br>
        <input type="email" name="email" id="email"><br><br>

        <Strong>Wait is your level of knowledge?</Strong><br>
        <label>
            <input type="radio" name="level" id="beginner" checked> Beginner
        </label>
        <label>
            <input type="radio" name="level" id="intermediate"> Intermediate
        </label>
        <label>
            <input type="radio" name="level" id="advanced"> Advanced
        </label><br><br>

        <strong>What is your region?</strong>
        <select name="" id="">
            <option disabled value="">What region?</option>
            <option value="ne">North East</option>
            <option value="so">South</option>
            <option value="ea">East</option>
            <option value="we">West</option>
        </select><br><br>

        <strong>Which technology do you know?</strong><br>
        <input type="checkbox" name="technology1" id="technology1" value="HTML">
        <label for="technology1">HTML</label>

        <input type="checkbox" name="technology2" id="technology2" value="CSS">
        <label for="technology2">CSS</label>

        <input type="checkbox" name="technology3" id="technology3" value="Javascript">
        <label for="technology3">Javascript</label><br><br>

        <label for="birthday">Birthday</label><br>
        <input type="date" name="birthday" id="birthday">
    </form>
</head>
<body>
    
</body>
</html>
