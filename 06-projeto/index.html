<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working with video</title>
</head>
<body>
    <h1>Videos Library</h1>    
    <video poster="thumb.png" controls width="420" height="340">
        <source src="natureza.mp4" type="video/mp4">
    </video>

    <h2>Audios Library</h2>
    <audio controls>
        <source src="curso.mp3" type="audio/mp3">
    </audio>
</body>
</html>
