<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tag details and summary</title>
</head>
<body>
    <h1>Summary</h1>
    <details open>
        <summary>Wardrobe lopas</summary>
        <p>6 doors with slow-motion hinges, 8 drawers with telescopic slide</p>
    </details>
    <details>
        <summary>Kitchen cabinet</summary>
        <p>4 piece cabinet, color white/green</p>
    </details>

    <h2>Datalist</h2>
    <form>
        <input list="furniture" name="furniture" placeholder="What car?">
        <datalist id="furniture">
            <option value="wardrobe"></option>
            <option value="cabinet"></option>
            <option value="chair"></option>
            <option value="sofa"></option>
            <option value="table"></option>
        </datalist>
    </form>
</body>
</html>
