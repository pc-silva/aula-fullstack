<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Working with table</title>
</head>
<body>
    <h1>Working With Table</h1>
    <!-- 
        Tabela é composta de linhas que são compostas de células.
        > <tr></tr> são linhas (rows).
        > <th></th> define o cabeçalho da tabela.
        > <td></td> Coloca dados dentro da tabela.
    -->
    <table>
        <caption>Tabela de serviços</caption>
        <tr>
            <th>ordem</th>
            <th>móvel</th>
            <th>valor</th>
            <th>data da montagem</th>
        </tr>
        <tr>
            <td>1</td>
            <td>Roupeiro</td>
            <td>R$ 180</td>
            <td>25/03/2026</td>
        </tr>
        <tr>
            <td>2</td>
            <td>Cozinha</td>
            <td>R$ 210</td>
            <td>18/03/2026</td>
        </tr>
    </table>
</body>
</html>
