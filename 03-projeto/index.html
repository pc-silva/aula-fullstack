<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>working with list</title>
</head>
<body>
    <h1>Working With List</h1>    
    <p>Ordered List</p>
    <ol>
        <li>Estudar programação</li>
        <li>Ler 1 hora de livro</li>
        <li>Ir para a academia</li>
    </ol>
    <p>Unordered List</p>
    <ul>
        <li>Ligar para o dentista</li>
        <li>Lavar o banheiro</li>
        <li>Comprar a vitamina do filho</li>
    </ul>
</body>
</html>
